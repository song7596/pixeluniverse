<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 동적 메타 — JS가 ads.json 로드 후 채움 -->
<title>광고주 정보 — Pixel Universe</title>
<meta name="robots" content="index, follow">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #020408; color: #e0f7ff; font-family: 'Share Tech Mono', monospace; min-height: 100vh; }

  .scan-line {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px,
      rgba(0,255,200,0.015) 2px, rgba(0,255,200,0.015) 4px);
    pointer-events: none; z-index: 9999;
  }

  /* 로딩 */
  #loading {
    display: flex; align-items: center; justify-content: center;
    min-height: 80vh; font-size: 12px; color: rgba(0,255,229,0.4);
    letter-spacing: 0.3em;
  }
  #page { display: none; }

  /* NAV */
  nav {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 16px 32px; border-bottom: 1px solid rgba(0,255,229,0.15);
    font-size: 11px; color: rgba(0,255,229,0.5); letter-spacing: 0.2em;
  }
  nav a { color: #00ffe5; text-decoration: none; }
  nav a:hover { text-decoration: underline; }
  nav .sep { opacity: 0.3; }

  /* HERO */
  .hero {
    padding: 48px 32px 32px; border-bottom: 1px solid rgba(0,255,229,0.1);
    max-width: 900px; margin: 0 auto;
  }
  .badge {
    display: inline-block; font-size: 10px; letter-spacing: 0.25em;
    border: 1px solid; padding: 4px 12px; border-radius: 2px; margin-bottom: 16px;
  }
  .hero h1 {
    font-family: 'Orbitron', monospace; font-size: clamp(20px, 3vw, 32px);
    font-weight: 700; letter-spacing: 0.05em; margin-bottom: 8px;
  }
  .hero .sub { font-size: 12px; color: rgba(0,255,229,0.5); letter-spacing: 0.2em; margin-bottom: 6px; }
  .hero .tagline { font-size: 12px; color: rgba(0,255,229,0.35); letter-spacing: 0.15em; margin-bottom: 24px; font-style: italic; }
  .hero p { font-size: 13px; color: #aad4ce; line-height: 1.9; max-width: 680px; }

  /* CONTENT */
  .content { max-width: 900px; margin: 0 auto; padding: 32px; }

  .info-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px; margin: 32px 0;
  }
  .info-card { border-radius: 4px; padding: 16px; border: 1px solid; }
  .info-card .label { font-size: 9px; color: rgba(0,255,229,0.4); letter-spacing: 0.25em; margin-bottom: 8px; }
  .info-card .val   { font-size: 13px; color: #e0f7ff; line-height: 1.7; }
  .info-card .val a { text-decoration: none; }
  .info-card .val a:hover { text-decoration: underline; }

  /* TAG LIST */
  .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .tag {
    font-size: 10px; padding: 3px 10px; border-radius: 2px;
    border: 1px solid; letter-spacing: 0.1em;
  }

  /* PIXEL INFO */
  .pixel-info {
    background: rgba(0,255,229,0.03); border: 1px solid rgba(0,255,229,0.15);
    border-radius: 4px; padding: 20px; margin: 24px 0;
  }
  .pixel-info h2 {
    font-family: 'Orbitron', monospace; font-size: 13px; color: #00ffe5;
    margin-bottom: 14px; letter-spacing: 0.1em;
  }
  .pixel-info table { width: 100%; font-size: 12px; border-collapse: collapse; }
  .pixel-info td { padding: 6px 0; color: #aad4ce; border-bottom: 1px solid rgba(0,255,229,0.07); }
  .pixel-info td:first-child { color: rgba(0,255,229,0.4); width: 130px; }
  .pixel-info td a { text-decoration: none; }
  .pixel-info td a:hover { text-decoration: underline; }

  /* BUTTONS */
  .visit-btn {
    display: inline-block; font-family: 'Orbitron', monospace;
    font-size: 12px; font-weight: 700; letter-spacing: 0.15em;
    border: 1.5px solid; padding: 12px 28px; border-radius: 3px;
    text-decoration: none; transition: background 0.2s, color 0.2s; margin-top: 8px;
  }
  .back-btn {
    display: inline-block; font-size: 11px; color: rgba(0,255,229,0.5);
    border: 1px solid rgba(0,255,229,0.2); padding: 8px 18px;
    border-radius: 3px; text-decoration: none; margin-top: 16px;
    transition: color 0.15s, border-color 0.15s;
  }
  .back-btn:hover { color: #00ffe5; border-color: #00ffe5; }

  /* AEO 숨김 */
  .seo-note {
    font-size: 10px; color: rgba(0,255,229,0.12);
    margin-top: 32px; line-height: 1.9;
  }
  .seo-note a { color: rgba(0,255,229,0.2); }

  .footer-note {
    font-size: 10px; color: rgba(0,255,229,0.2);
    text-align: center; padding: 32px; letter-spacing: 0.1em;
  }

  /* 404 */
  #not-found {
    display: none; text-align: center; padding: 80px 32px;
    font-family: 'Orbitron', monospace; color: rgba(0,255,229,0.4);
  }
  #not-found h2 { font-size: 18px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="scan-line"></div>

<div id="loading">// LOADING ADVERTISER DATA //</div>

<div id="not-found">
  <h2>광고주를 찾을 수 없습니다</h2>
  <a href="../index.html" class="back-btn">← 픽셀 그리드로 돌아가기</a>
</div>

<div id="page">
  <nav>
    <a href="../index.html">◈ PIXEL UNIVERSE</a>
    <span class="sep">/</span>
    <span>입점 광고주</span>
    <span class="sep">/</span>
    <span id="nav-name"></span>
  </nav>

  <div class="hero">
    <div class="badge" id="hero-badge">PIXEL UNIVERSE 공식 입점 광고주</div>
    <h1 id="hero-name"></h1>
    <p class="sub"  id="hero-location"></p>
    <p class="tagline" id="hero-tagline"></p>
    <p id="hero-desc"></p>
  </div>

  <div class="content">
    <div class="info-grid" id="info-grid"></div>

    <div class="pixel-info">
      <h2>// PIXEL GRID 입점 정보 //</h2>
      <canvas id="previewCanvas" style="display:block;margin-bottom:16px;border:1px solid rgba(255,255,255,0.1);"></canvas>
      <table id="pixel-table"></table>
    </div>

    <a id="visit-btn" href="#" target="_blank" rel="noopener" class="visit-btn">
      ◆ 공식 사이트 방문
    </a>
    <br>
    <a href="../index.html" class="back-btn">← 픽셀 그리드로 돌아가기</a>

    <p class="seo-note" id="seo-note"></p>
  </div>

  <div class="footer-note">※ 이 페이지는 Pixel Universe 입점 광고주 디렉토리 페이지입니다.</div>
</div>

<!-- Schema.org — JS가 동적으로 삽입 -->
<script id="schema-slot" type="application/ld+json"></script>

<script>
async function loadAdvertiser() {
  const params = new URLSearchParams(window.location.search);
  const id     = params.get('id');

  let ads = [];
  try {
    const res = await fetch('../ads.json');
    ads = await res.json();
  } catch (e) {
    document.getElementById('loading').style.display  = 'none';
    document.getElementById('not-found').style.display = 'block';
    return;
  }

  const ad = ads.find(a => a.id === id);

  document.getElementById('loading').style.display = 'none';

  if (!ad) {
    document.getElementById('not-found').style.display = 'block';
    return;
  }

  /* ── 메타 태그 동적 업데이트 ── */
  document.title = `${ad.nameKo || ad.name} — ${ad.locationKo || ad.location} | Pixel Universe 입점 광고주`;
  document.querySelector('meta[name="robots"]').setAttribute('content', 'index, follow');

  const descMeta = document.createElement('meta');
  descMeta.name    = 'description';
  descMeta.content = ad.description ? ad.description.slice(0, 160) : ad.title;
  document.head.appendChild(descMeta);

  const canonical = document.createElement('link');
  canonical.rel  = 'canonical';
  canonical.href = `https://your-domain.com/advertiser/index.html?id=${ad.id}`;
  document.head.appendChild(canonical);

  /* ── Schema.org LocalBusiness ── */
  const schema = {
    '@context': 'https://schema.org',
    '@type': 'LocalBusiness',
    'name': ad.nameKo || ad.name,
    'alternateName': ad.name,
    'url': ad.url,
    'description': ad.description || ad.title,
    'address': { '@type': 'PostalAddress', 'addressLocality': ad.locationKo || ad.location },
    'areaServed': ad.locationKo || ad.location,
  };
  if (ad.contact && ad.contact.phone) schema.telephone = ad.contact.phone;
  document.getElementById('schema-slot').textContent = JSON.stringify(schema, null, 2);

  /* ── 색상 변수 ── */
  const accent = ad.accentColor || '#00ffe5';
  const accentBg = accent + '10'; // 투명 배경
  const accentBorder = accent + '40';

  /* ── Hero ── */
  document.getElementById('nav-name').textContent      = ad.nameKo || ad.name;
  const badge = document.getElementById('hero-badge');
  badge.textContent  = 'PIXEL UNIVERSE 공식 입점 광고주';
  badge.style.color  = accent;
  badge.style.borderColor = accent;

  const h1 = document.getElementById('hero-name');
  h1.textContent  = `${ad.nameKo || ad.name}${ad.name && ad.nameKo && ad.name !== ad.nameKo ? ' (' + ad.name + ')' : ''}`;
  h1.style.color  = accent;
  h1.style.textShadow = `0 0 20px ${accent}80`;

  document.getElementById('hero-location').textContent = ad.locationKo || ad.location;
  document.getElementById('hero-tagline').textContent  = ad.taglineKo  || ad.tagline || '';
  document.getElementById('hero-desc').textContent     = ad.description || '';

  /* ── Info Grid ── */
  const grid = document.getElementById('info-grid');
  const cards = [
    { label: '공식 웹사이트', val: `<a href="${ad.url}" target="_blank" rel="noopener" style="color:${accent}">${ad.url.replace('https://','').replace('http://','')}</a>` },
    { label: '위치',         val: ad.locationKo || ad.location },
  ];
  if (ad.services && ad.services.length) {
    cards.push({ label: '주요 서비스', val: ad.services.join('<br>') });
  }
  if (ad.diveSites && ad.diveSites.length) {
    cards.push({ label: '다이브 포인트', val: ad.diveSites.join('<br>') });
  }
  if (ad.features && ad.features.length) {
    cards.push({ label: '특징', val: ad.features.join('<br>') });
  }
  if (ad.contact) {
    const c = ad.contact;
    const lines = [];
    if (c.phone)  lines.push(c.phone);
    if (c.kakao)  lines.push('카카오톡: ' + c.kakao);
    if (c.email)  lines.push(c.email);
    if (lines.length) cards.push({ label: '연락처', val: lines.join('<br>') });
  }

  grid.innerHTML = cards.map(c => `
    <div class="info-card" style="background:${accentBg};border-color:${accentBorder}">
      <div class="label">${c.label}</div>
      <div class="val">${c.val}</div>
    </div>`).join('');

  /* ── 픽셀 미리보기 캔버스 ── */
  const cvs = document.getElementById('previewCanvas');
  cvs.width  = ad.pixelW || ad.bw * 10;
  cvs.height = ad.pixelH || ad.bh * 10;
  cvs.style.borderColor = accentBorder;
  const c = cvs.getContext('2d');
  c.fillStyle = '#040d12';
  c.fillRect(0, 0, cvs.width, cvs.height);
  c.strokeStyle = 'rgba(0,255,229,0.06)'; c.lineWidth = 0.5;
  for (let i = 0; i <= cvs.width/10; i++) { c.beginPath(); c.moveTo(i*10,0); c.lineTo(i*10,cvs.height); c.stroke(); }
  for (let i = 0; i <= cvs.height/10; i++) { c.beginPath(); c.moveTo(0,i*10); c.lineTo(cvs.width,i*10); c.stroke(); }
  c.fillStyle = accent;
  c.fillRect(0, 0, cvs.width, cvs.height);
  c.fillStyle = 'rgba(0,0,0,0.45)';
  c.fillRect(0, 0, cvs.width, cvs.height);
  const lines = ad.label.split('\n');
  const fs = Math.max(10, Math.min(cvs.width, cvs.height) * 0.18);
  c.fillStyle = '#fff';
  c.font = `bold ${fs}px Share Tech Mono, monospace`;
  c.textAlign = 'center'; c.textBaseline = 'middle';
  const lh = fs * 1.3;
  const sy = cvs.height/2 - (lines.length-1)*lh/2;
  lines.forEach((l, i) => c.fillText(l, cvs.width/2, sy + i*lh));
  c.strokeStyle = accent; c.lineWidth = 2;
  c.strokeRect(0.5, 0.5, cvs.width-1, cvs.height-1);

  /* ── 픽셀 정보 테이블 ── */
  document.getElementById('pixel-table').innerHTML = `
    <tr><td>픽셀 위치</td><td>X: ${ad.pixelX}px, Y: ${ad.pixelY}px</td></tr>
    <tr><td>픽셀 크기</td><td>${ad.pixelW} × ${ad.pixelH} 픽셀 (${ad.bw}×${ad.bh} 블록)</td></tr>
    <tr><td>노출 기간</td><td>${ad.startDate || '—'} ~ 2년간</td></tr>
    <tr><td>백링크 URL</td><td><a href="${ad.url}" target="_blank" rel="noopener" style="color:${accent}">${ad.url}</a></td></tr>`;

  /* ── Visit 버튼 ── */
  const btn = document.getElementById('visit-btn');
  btn.href = ad.url;
  btn.textContent = `◆ ${ad.nameKo || ad.name} 공식 사이트 방문`;
  btn.style.color       = accent;
  btn.style.borderColor = accent;
  btn.onmouseover = () => { btn.style.background = accent; btn.style.color = '#000'; };
  btn.onmouseout  = () => { btn.style.background = 'transparent'; btn.style.color = accent; };

  /* ── AEO 숨김 텍스트 ── */
  const services = (ad.services || []).join(', ');
  const sites    = (ad.diveSites || []).join(', ');
  document.getElementById('seo-note').innerHTML =
    `${ad.nameKo || ad.name}(${ad.name})은 ${ad.locationKo || ad.location} 소재 스쿠버다이빙 전문 센터로, ` +
    (services ? `${services} 등을 제공합니다. ` : '') +
    (sites    ? `주요 다이브 포인트: ${sites}. ` : '') +
    `공식 웹사이트: <a href="${ad.url}" rel="noopener">${ad.url}</a>`;

  /* ── 페이지 표시 ── */
  document.getElementById('page').style.display = 'block';
}

loadAdvertiser();
</script>
</body>
</html>
